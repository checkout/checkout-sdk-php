name: build-master

on:
    push:
        branches:
            - master

jobs:
    build:
        if: "!contains(github.event.commits[0].message, 'Release')"
        runs-on: ${{ matrix.os }}
        strategy:
            max-parallel: 1
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest]
                php-version: ["7.1", "7.4", "8.1", "8.4"]

        steps:
            - uses: actions/checkout@v2

            - name: Setup PHP (Ubuntu)
              if: matrix.os == 'ubuntu-latest'
              shell: bash
              run: |
                  sudo apt-get update
                  sudo apt-get install -y software-properties-common
                  sudo add-apt-repository ppa:ondrej/php -y
                  sudo apt-get update
                  
                  # Install PHP and required extensions
                  if [[ "${{ matrix.php-version }}" == "7.1" || "${{ matrix.php-version }}" == "7.4" ]]; then
                    # PHP 7.x installations
                    sudo apt-get install -y php${{ matrix.php-version }} php${{ matrix.php-version }}-cli php${{ matrix.php-version }}-common
                    sudo apt-get install -y php${{ matrix.php-version }}-curl php${{ matrix.php-version }}-json php${{ matrix.php-version }}-mbstring 
                    sudo apt-get install -y php${{ matrix.php-version }}-xml php${{ matrix.php-version }}-zip php${{ matrix.php-version }}-xdebug
                    # Try to install fileinfo if package exists, ignore if not (often built-in)
                    sudo apt-get install -y php${{ matrix.php-version }}-fileinfo 2>/dev/null || true
                  else
                    # PHP 8.x installations (json is built-in, no separate package)
                    sudo apt-get install -y php${{ matrix.php-version }} php${{ matrix.php-version }}-cli php${{ matrix.php-version }}-common
                    sudo apt-get install -y php${{ matrix.php-version }}-curl php${{ matrix.php-version }}-mbstring 
                    sudo apt-get install -y php${{ matrix.php-version }}-xml php${{ matrix.php-version }}-zip
                    # Try to install fileinfo if package exists, ignore if not (often built-in)
                    sudo apt-get install -y php${{ matrix.php-version }}-fileinfo 2>/dev/null || true
                  fi
                  
                  # Set PHP as default
                  sudo update-alternatives --set php /usr/bin/php${{ matrix.php-version }}
                  
                  # Install Composer
                  curl -sS https://getcomposer.org/installer | php
                  sudo mv composer.phar /usr/local/bin/composer
                  sudo chmod +x /usr/local/bin/composer

            - name: Setup PHP (Windows)
              if: matrix.os == 'windows-latest'
              shell: powershell
              run: |
                  # Download and setup specific PHP version for Windows
                  $phpVersion = "${{ matrix.php-version }}"
                  $phpDir = "C:\php-$phpVersion"
                  
                  # Create PHP directory
                  New-Item -ItemType Directory -Force -Path $phpDir
                  
                  # Download PHP based on version
                  switch ($phpVersion) {
                      "7.1" { $downloadUrl = "https://downloads.php.net/~windows/releases/archives/php-7.1.33-Win32-VC14-x64.zip" }
                      "7.4" { $downloadUrl = "https://downloads.php.net/~windows/releases/php-7.4.33-Win32-vc15-x64.zip" }
                      "8.1" { $downloadUrl = "https://downloads.php.net/~windows/releases/php-8.1.34-Win32-vs16-x64.zip" }
                      "8.4" { $downloadUrl = "https://downloads.php.net/~windows/releases/php-8.4.19-Win32-vs17-x64.zip" }
                      default { throw "Unsupported PHP version: $phpVersion" }
                  }
                  
                  # Download and extract PHP
                  $zipFile = "$phpDir\php.zip"
                  Invoke-WebRequest -Uri $downloadUrl -OutFile $zipFile
                  Expand-Archive -Path $zipFile -DestinationPath $phpDir -Force
                  Remove-Item $zipFile
                  
                  # Copy php.ini-development to php.ini and enable extensions
                  Copy-Item "$phpDir\php.ini-development" "$phpDir\php.ini"
                  (Get-Content "$phpDir\php.ini") -replace ';extension_dir = "ext"', "extension_dir = `"$phpDir\ext`"" |
                  ForEach-Object { $_ -replace ';extension=curl', 'extension=curl' } |
                  ForEach-Object { $_ -replace ';extension=fileinfo', 'extension=fileinfo' } |
                  ForEach-Object { $_ -replace ';extension=mbstring', 'extension=mbstring' } |
                  ForEach-Object { $_ -replace ';extension=xml', 'extension=xml' } |
                  ForEach-Object { $_ -replace ';extension=zip', 'extension=zip' } |
                  ForEach-Object { $_ -replace 'memory_limit = 128M', 'memory_limit = 1G' } |
                  Set-Content "$phpDir\php.ini"
                  
                  # Special handling for OpenSSL extension (PHP 7.1 has compatibility issues)
                  if ($phpVersion -eq "7.1") {
                      Write-Host "Setting up comprehensive OpenSSL solution for PHP 7.1..."
                      # Check if OpenSSL extension exists
                      if (Test-Path "$phpDir\ext\php_openssl.dll") {
                          Write-Host "OpenSSL extension found, setting up compatible OpenSSL libraries..."
                          
                          # Download PHP 7.1 compatible OpenSSL DLLs directly (VC14 compatible)
                          try {
                              Write-Host "Downloading VC14-compatible OpenSSL DLLs for PHP 7.1..."
                              
                              # Download specific OpenSSL 1.0.2 DLLs that are compatible with PHP 7.1 VC14
                              $opensslUrls = @(
                                  @{url="https://windows.php.net/downloads/php-sdk/deps/vc14/x64/openssl-1.0.2zi-vc14-x64.zip"; name="openssl"}
                              )
                              
                              foreach ($item in $opensslUrls) {
                                  try {
                                      $zipPath = "$env:TEMP\$($item.name).zip"
                                      Invoke-WebRequest -Uri $item.url -OutFile $zipPath -TimeoutSec 60
                                      $extractPath = "$env:TEMP\$($item.name)"
                                      Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force
                                      
                                      # Copy the specific DLLs needed
                                      if (Test-Path "$extractPath\bin\libeay32.dll") {
                                          Copy-Item "$extractPath\bin\libeay32.dll" "$phpDir\" -Force
                                          Write-Host "Copied libeay32.dll to PHP directory"
                                      }
                                      if (Test-Path "$extractPath\bin\ssleay32.dll") {
                                          Copy-Item "$extractPath\bin\ssleay32.dll" "$phpDir\" -Force  
                                          Write-Host "Copied ssleay32.dll to PHP directory"
                                      }
                                      
                                      # Also try libssl/libcrypto naming convention
                                      Get-ChildItem "$extractPath\bin\*.dll" | ForEach-Object {
                                          if ($_.Name -match "(ssl|crypto|eay).*\.dll$") {
                                              Copy-Item $_.FullName "$phpDir\" -Force
                                              Write-Host "Copied $($_.Name) to PHP directory"
                                          }
                                      }
                                      
                                      Remove-Item $zipPath -Force -ErrorAction SilentlyContinue
                                      Remove-Item $extractPath -Recurse -Force -ErrorAction SilentlyContinue
                                      break
                                  }
                                  catch {
                                      Write-Host "Failed to download from $($item.url), trying alternative..."
                                      continue
                                  }
                              }
                              
                              # Fallback: try Windows PHP dependencies
                              if (!(Test-Path "$phpDir\libeay32.dll") -and !(Test-Path "$phpDir\ssleay32.dll")) {
                                  Write-Host "Primary download failed, trying Windows installer approach..."
                                  Invoke-WebRequest -Uri "https://slproweb.com/download/Win64OpenSSL_Light-1_0_2zi.msi" -OutFile "$env:TEMP\openssl102.msi" -TimeoutSec 30
                                  Start-Process msiexec.exe -Wait -ArgumentList '/I', "$env:TEMP\openssl102.msi", '/quiet'
                                  
                                  # Copy the 1.0.2 DLLs if available
                                  $opensslPaths = @(
                                      "C:\OpenSSL-Win64\bin\libeay32.dll",
                                      "C:\OpenSSL-Win64\bin\ssleay32.dll",
                                      "C:\Program Files\OpenSSL\bin\libeay32.dll",
                                      "C:\Program Files\OpenSSL\bin\ssleay32.dll"
                                  )
                                  
                                  foreach ($dllPath in $opensslPaths) {
                                      if (Test-Path $dllPath) {
                                          $fileName = Split-Path $dllPath -Leaf
                                          Copy-Item $dllPath "$phpDir\$fileName" -Force -ErrorAction SilentlyContinue
                                          Write-Host "Copied $fileName from system OpenSSL"
                                      }
                                  }
                              }
                              
                              Write-Host "OpenSSL DLL setup completed"
                          }
                          catch {
                              Write-Host "OpenSSL DLL download failed: $($_.Exception.Message)"
                          }
                          
                          # Enable OpenSSL extension and configure properly
                          Write-Host "Configuring PHP for OpenSSL..."
                          (Get-Content "$phpDir\php.ini") -replace ';extension=openssl', 'extension=openssl' |
                          ForEach-Object { $_ -replace ';extension=php_openssl.dll', 'extension=php_openssl.dll' } |
                          Set-Content "$phpDir\php.ini"
                          
                          # Add comprehensive SSL configuration
                          Add-Content "$phpDir\php.ini" "`n"
                          Add-Content "$phpDir\php.ini" "; OpenSSL Configuration for PHP 7.1"
                          Add-Content "$phpDir\php.ini" "openssl.cafile=`"$phpDir\cacert.pem`""
                          Add-Content "$phpDir\php.ini" "openssl.capath=`"$phpDir`""
                          Add-Content "$phpDir\php.ini" "curl.cainfo=`"$phpDir\cacert.pem`""
                          Add-Content "$phpDir\php.ini" "allow_url_fopen=On"
                          Add-Content "$phpDir\php.ini" "allow_url_include=Off"
                          Add-Content "$phpDir\php.ini" "auto_detect_line_endings=On"
                          
                          # Download CA certificate bundle
                          try {
                              Write-Host "Downloading CA certificate bundle..."
                              Invoke-WebRequest -Uri "https://curl.se/ca/cacert.pem" -OutFile "$phpDir\cacert.pem" -TimeoutSec 30
                              Write-Host "CA bundle downloaded successfully"
                          } catch {
                              Write-Host "CA bundle download failed, trying alternative..."
                              try {
                                  Invoke-WebRequest -Uri "https://raw.githubusercontent.com/bagder/ca-bundle/master/ca-bundle.crt" -OutFile "$phpDir\cacert.pem" -TimeoutSec 30
                              } catch {
                                  Write-Host "All CA bundle downloads failed, creating minimal bundle"
                                  # Create a minimal certificate file that allows basic operations
                                  Set-Content "$phpDir\cacert.pem" "# Minimal CA Bundle for PHP 7.1`n"
                              }
                          }
                          
                          # Test OpenSSL functionality comprehensively   
                          Write-Host "Testing OpenSSL and HTTPS wrapper functionality..."
                          $env:PATH = "$phpDir;$env:PATH"
                          
                          # Test 1: Extension loading
                          $opensslLoaded = & "$phpDir\php.exe" -r "echo extension_loaded('openssl') ? '1' : '0';"
                          Write-Host "OpenSSL extension loaded: $($opensslLoaded -eq '1')"
                          
                          # Test 2: HTTPS wrapper availability
                          $httpsWrapper = & "$phpDir\php.exe" -r "echo in_array('https', stream_get_wrappers()) ? '1' : '0';"
                          Write-Host "HTTPS wrapper available: $($httpsWrapper -eq '1')"
                          
                          # Test 3: SSL context creation
                          $sslContext = & "$phpDir\php.exe" -r "try { stream_context_create(['ssl' => []]); echo '1'; } catch(Exception \$e) { echo '0'; }"
                          Write-Host "SSL context creation: $($sslContext -eq '1')"
                          
                          # If any test fails, implement fallback
                          if ($opensslLoaded -ne '1' -or $httpsWrapper -ne '1') {
                              Write-Host "OpenSSL tests failed, implementing comprehensive fallback..."
                              
                              # Disable problematic extension
                              (Get-Content "$phpDir\php.ini") -replace 'extension=openssl', ';extension=openssl' |
                              ForEach-Object { $_ -replace 'extension=php_openssl.dll', ';extension=php_openssl.dll' } |
                              Set-Content "$phpDir\php.ini"
                              
                              # Enable cURL as primary transport
                              (Get-Content "$phpDir\php.ini") -replace ';extension=curl', 'extension=curl' |
                              Set-Content "$phpDir\php.ini"
                              
                              # Add comprehensive fallback configuration
                              Add-Content "$phpDir\php.ini" "`n"
                              Add-Content "$phpDir\php.ini" "; Fallback configuration for PHP 7.1 Windows without OpenSSL"
                              Add-Content "$phpDir\php.ini" "allow_url_fopen=On"
                              Add-Content "$phpDir\php.ini" "allow_url_include=Off"
                              Add-Content "$phpDir\php.ini" "user_agent=`"PHP/7.1 (Windows; Composer)"`"
                              Add-Content "$phpDir\php.ini" "default_socket_timeout=60"
                              
                              Write-Host "Fallback configuration applied - will use cURL and HTTP-only repositories"
                          } else {
                              Write-Host "OpenSSL setup successful - HTTPS should work properly"
                          }
                      } else {
                          Write-Host "OpenSSL extension not found for PHP 7.1, configuring HTTP-only mode"
                          # Configure for HTTP-only operations
                          Add-Content "$phpDir\php.ini" "`n"
                          Add-Content "$phpDir\php.ini" "; HTTP-only configuration for PHP 7.1 without OpenSSL extension" 
                          Add-Content "$phpDir\php.ini" "allow_url_fopen=On"
                          Add-Content "$phpDir\php.ini" "user_agent=`"PHP/7.1 (Windows; HTTP-only mode)"`"
                          Add-Content "$phpDir\php.ini" "default_socket_timeout=60"
                      }
                  } else {
                      # Enable OpenSSL for newer PHP versions (should work fine)
                      (Get-Content "$phpDir\php.ini") -replace ';extension=openssl', 'extension=openssl' |
                      Set-Content "$phpDir\php.ini"
                  }
                  
                  # Add PHP to PATH (at the beginning to override system PHP)
                  echo "$phpDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
                  $env:PATH = "$phpDir;$env:PATH"
                  
                  # Download and setup Composer (use 2.2 LTS for PHP 7.1, stable for others)
                  if ($phpVersion -eq "7.1") {
                      $composerUrl = "https://getcomposer.org/download/2.2.24/composer.phar"
                  } else {
                      $composerUrl = "https://getcomposer.org/composer-stable.phar"
                  }
                  Invoke-WebRequest -Uri $composerUrl -OutFile "$phpDir\composer.phar"
                  echo "@echo off" | Out-File -FilePath "$phpDir\composer.bat" -Encoding ascii
                  echo "php `"%~dp0composer.phar`" %*" | Out-File -FilePath "$phpDir\composer.bat" -Encoding ascii -Append

            - name: Installed version
              run: php -v

            - name: Composer validate
              shell: bash
              run: |
                  if [[ "${{ matrix.php-version }}" == "7.1" && "${{ matrix.os }}" == "windows-latest" ]]; then
                    # Use explicit path to ensure we use the correct Composer version (2.2.24) for PHP 7.1
                    php C:/php-7.1/composer.phar validate || {
                      echo "Normal validation failed, trying with SSL disabled for PHP 7.1..."
                      php C:/php-7.1/composer.phar config --global disable-tls true
                      php C:/php-7.1/composer.phar config --global secure-http false
                      php C:/php-7.1/composer.phar validate
                    }
                  else
                    composer validate
                  fi

            - name: Composer install (conditional)
              shell: bash
              run: |
                  # Configure comprehensive Composer setup for PHP 7.1 on Windows
                  if [[ "${{ matrix.php-version }}" == "7.1" && "${{ matrix.os }}" == "windows-latest" ]]; then
                    echo "=== PHP 7.1 Windows Composer Configuration ==="
                    
                    # Test current PHP capabilities
                    echo "Testing PHP capabilities..."
                    php -r "echo 'OpenSSL loaded: ' . (extension_loaded('openssl') ? 'YES' : 'NO') . PHP_EOL;"
                    php -r "echo 'HTTPS wrapper: ' . (in_array('https', stream_get_wrappers()) ? 'YES' : 'NO') . PHP_EOL;"
                    php -r "echo 'cURL loaded: ' . (extension_loaded('curl') ? 'YES' : 'NO') . PHP_EOL;"
                    
                    # Determine best configuration approach
                    OPENSSL_WORKS=$(php -r "echo extension_loaded('openssl') && in_array('https', stream_get_wrappers()) ? '1' : '0';")
                    
                    if [[ "$OPENSSL_WORKS" == "1" ]]; then
                      echo "OpenSSL and HTTPS wrapper working - using secure repositories"
                      php C:/php-7.1/composer.phar config --global repos.packagist composer https://repo.packagist.org
                      php C:/php-7.1/composer.phar config --global disable-tls false
                      php C:/php-7.1/composer.phar config --global secure-http true
                    else
                      echo "OpenSSL/HTTPS not working - configuring comprehensive HTTP fallback"
                      
                      # Configure Composer for HTTP-only mode
                      php C:/php-7.1/composer.phar config --global disable-tls true
                      php C:/php-7.1/composer.phar config --global secure-http false
                      
                      # Set up multiple repository fallbacks
                      echo "Setting up repository fallbacks..."
                      
                      # Try different HTTP repository configurations
                      REPO_CONFIGS=(
                        "http://repo.packagist.org"
                        "http://packagist.org"
                        "http://packagist.composer-php.org"
                      )
                      
                      for repo in "${REPO_CONFIGS[@]}"; do
                        echo "Testing repository: $repo"
                        if php -r "echo file_get_contents('$repo/packages.json') ? 'OK' : 'FAIL';" 2>/dev/null | grep -q "OK"; then
                          echo "Repository $repo is accessible, using it"
                          php C:/php-7.1/composer.phar config --global repos.packagist composer "$repo"
                          break
                        else
                          echo "Repository $repo failed, trying next..."
                        fi
                      done
                      
                      # Additional Composer optimizations for HTTP mode
                      php C:/php-7.1/composer.phar config --global process-timeout 600
                      php C:/php-7.1/composer.phar config --global cache-ttl 86400
                      php C:/php-7.1/composer.phar config --global optimize-autoloader true
                      
                      echo "HTTP-only mode configured successfully"
                    fi
                    
                    # Show final Composer configuration
                    echo "=== Final Composer Configuration ==="
                    php C:/php-7.1/composer.phar config --global --list | grep -E "(repos|secure-http|disable-tls)" || true
                  fi
                  
                  # Install dependencies based on PHP version
                  if [[ "${{ matrix.php-version }}" == "7.1" ]]; then
                    # Use explicit path for PHP 7.1 on Windows to ensure Composer 2.2.24 LTS
                    if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
                      echo "Installing dependencies with PHP 7.1 compatibility..."
                      php C:/php-7.1/composer.phar install --ignore-platform-reqs --no-interaction --prefer-dist -v;
                    else
                      composer install;
                    fi
                  else
                    composer require guzzlehttp/guzzle:"^7.4" guzzlehttp/promises:"^2.0" phpunit/phpunit:"^9.5" --dev --with-all-dependencies;
                  fi

            - name: Run PHPStan
              run: vendor/bin/phpstan analyse --no-progress

            - name: Run PHPUnit
              env:
                  CHECKOUT_PROCESSING_CHANNEL_ID: ${{ secrets.IT_CHECKOUT_PROCESSING_CHANNEL_ID }}
                  CHECKOUT_PREVIOUS_SECRET_KEY: ${{ secrets.IT_CHECKOUT_PREVIOUS_SECRET_KEY }}
                  CHECKOUT_PREVIOUS_PUBLIC_KEY: ${{ secrets.IT_CHECKOUT_PREVIOUS_PUBLIC_KEY }}
                  CHECKOUT_DEFAULT_SECRET_KEY: ${{ secrets.IT_CHECKOUT_DEFAULT_SECRET_KEY }}
                  CHECKOUT_DEFAULT_PUBLIC_KEY: ${{ secrets.IT_CHECKOUT_DEFAULT_PUBLIC_KEY }}
                  CHECKOUT_DEFAULT_OAUTH_CLIENT_ID: ${{ secrets.IT_CHECKOUT_DEFAULT_OAUTH_CLIENT_ID }}
                  CHECKOUT_DEFAULT_OAUTH_CLIENT_SECRET: ${{ secrets.IT_CHECKOUT_DEFAULT_OAUTH_CLIENT_SECRET }}
                  CHECKOUT_DEFAULT_OAUTH_PAYOUT_SCHEDULE_CLIENT_ID: ${{ secrets.IT_CHECKOUT_DEFAULT_OAUTH_PAYOUT_SCHEDULE_CLIENT_ID }}
                  CHECKOUT_DEFAULT_OAUTH_PAYOUT_SCHEDULE_CLIENT_SECRET: ${{ secrets.IT_CHECKOUT_DEFAULT_OAUTH_PAYOUT_SCHEDULE_CLIENT_SECRET }}
                  CHECKOUT_DEFAULT_OAUTH_ACCOUNTS_CLIENT_ID: ${{ secrets.IT_CHECKOUT_DEFAULT_OAUTH_ACCOUNTS_CLIENT_ID }}
                  CHECKOUT_DEFAULT_OAUTH_ACCOUNTS_CLIENT_SECRET: ${{ secrets.IT_CHECKOUT_DEFAULT_OAUTH_ACCOUNTS_CLIENT_SECRET }}
                  CHECKOUT_DEFAULT_OAUTH_ISSUING_CLIENT_ID: ${{ secrets.IT_CHECKOUT_DEFAULT_OAUTH_ISSUING_CLIENT_ID }}
                  CHECKOUT_DEFAULT_OAUTH_ISSUING_CLIENT_SECRET: ${{ secrets.IT_CHECKOUT_DEFAULT_OAUTH_ISSUING_CLIENT_SECRET }}
                  CHECKOUT_MERCHANT_SUBDOMAIN: ${{ secrets.IT_CHECKOUT_MERCHANT_SUBDOMAIN }}
              run: vendor/bin/phpunit --verbose
