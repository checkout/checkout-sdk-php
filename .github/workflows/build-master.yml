name: build-master

on:
    push:
        branches:
            - master

jobs:
    build:
        if: "!contains(github.event.commits[0].message, 'Release')"
        runs-on: ${{ matrix.os }}
        strategy:
            max-parallel: 1
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest]
                php-version: ["7.1", "7.4", "8.1", "8.4"]

        steps:
            - uses: actions/checkout@v2

            - name: Setup PHP (Ubuntu)
              if: matrix.os == 'ubuntu-latest'
              shell: bash
              run: |
                  sudo apt-get update
                  sudo apt-get install -y software-properties-common
                  sudo add-apt-repository ppa:ondrej/php -y
                  sudo apt-get update
                  
                  # Install PHP and required extensions
                  if [[ "${{ matrix.php-version }}" == "7.1" || "${{ matrix.php-version }}" == "7.4" ]]; then
                    # PHP 7.x installations
                    sudo apt-get install -y php${{ matrix.php-version }} php${{ matrix.php-version }}-cli php${{ matrix.php-version }}-common
                    sudo apt-get install -y php${{ matrix.php-version }}-curl php${{ matrix.php-version }}-json php${{ matrix.php-version }}-mbstring 
                    sudo apt-get install -y php${{ matrix.php-version }}-xml php${{ matrix.php-version }}-zip php${{ matrix.php-version }}-xdebug
                    # Try to install fileinfo if package exists, ignore if not (often built-in)
                    sudo apt-get install -y php${{ matrix.php-version }}-fileinfo 2>/dev/null || true
                  else
                    # PHP 8.x installations (json is built-in, no separate package)
                    sudo apt-get install -y php${{ matrix.php-version }} php${{ matrix.php-version }}-cli php${{ matrix.php-version }}-common
                    sudo apt-get install -y php${{ matrix.php-version }}-curl php${{ matrix.php-version }}-mbstring 
                    sudo apt-get install -y php${{ matrix.php-version }}-xml php${{ matrix.php-version }}-zip
                    # Try to install fileinfo if package exists, ignore if not (often built-in)
                    sudo apt-get install -y php${{ matrix.php-version }}-fileinfo 2>/dev/null || true
                  fi
                  
                  # Set PHP as default
                  sudo update-alternatives --set php /usr/bin/php${{ matrix.php-version }}
                  
                  # Install Composer
                  curl -sS https://getcomposer.org/installer | php
                  sudo mv composer.phar /usr/local/bin/composer
                  sudo chmod +x /usr/local/bin/composer

            - name: Setup PHP (Windows)
              if: matrix.os == 'windows-latest'
              shell: powershell
              run: |
                  # Download and setup specific PHP version for Windows
                  $phpVersion = "${{ matrix.php-version }}"
                  $phpDir = "C:\php-$phpVersion"
                  
                  # Create PHP directory
                  New-Item -ItemType Directory -Force -Path $phpDir
                  
                  # Download PHP based on version
                  switch ($phpVersion) {
                      "7.1" { $downloadUrl = "https://downloads.php.net/~windows/releases/archives/php-7.1.33-Win32-VC14-x64.zip" }
                      "7.4" { $downloadUrl = "https://downloads.php.net/~windows/releases/php-7.4.33-Win32-vc15-x64.zip" }
                      "8.1" { $downloadUrl = "https://downloads.php.net/~windows/releases/php-8.1.34-Win32-vs16-x64.zip" }
                      "8.4" { $downloadUrl = "https://downloads.php.net/~windows/releases/php-8.4.19-Win32-vs17-x64.zip" }
                      default { throw "Unsupported PHP version: $phpVersion" }
                  }
                  
                  # Download and extract PHP
                  $zipFile = "$phpDir\php.zip"
                  Invoke-WebRequest -Uri $downloadUrl -OutFile $zipFile
                  Expand-Archive -Path $zipFile -DestinationPath $phpDir -Force
                  Remove-Item $zipFile
                  
                  # Copy php.ini-development to php.ini and enable extensions
                  Copy-Item "$phpDir\php.ini-development" "$phpDir\php.ini"
                  (Get-Content "$phpDir\php.ini") -replace ';extension_dir = "ext"', "extension_dir = `"$phpDir\ext`"" |
                  ForEach-Object { $_ -replace ';extension=curl', 'extension=curl' } |
                  ForEach-Object { $_ -replace ';extension=fileinfo', 'extension=fileinfo' } |
                  ForEach-Object { $_ -replace ';extension=mbstring', 'extension=mbstring' } |
                  ForEach-Object { $_ -replace ';extension=xml', 'extension=xml' } |
                  ForEach-Object { $_ -replace ';extension=zip', 'extension=zip' } |
                  ForEach-Object { $_ -replace 'memory_limit = 128M', 'memory_limit = 1G' } |
                  Set-Content "$phpDir\php.ini"
                  
                  # Special handling for OpenSSL extension (PHP 7.1 has compatibility issues)
                  if ($phpVersion -eq "7.1") {
                      Write-Host "Setting up OpenSSL for PHP 7.1..."
                      # Check if OpenSSL extension exists
                      if (Test-Path "$phpDir\ext\php_openssl.dll") {
                          # Download OpenSSL DLLs for PHP 7.1 compatibility
                          try {
                              Write-Host "Downloading OpenSSL libraries for PHP 7.1..."
                              Invoke-WebRequest -Uri "https://slproweb.com/download/Win64OpenSSL_Light-1_1_1w.msi" -OutFile "$env:TEMP\openssl.msi" -TimeoutSec 30
                              Start-Process msiexec.exe -Wait -ArgumentList '/I', "$env:TEMP\openssl.msi", '/quiet'
                              
                              # Enable OpenSSL extension
                              (Get-Content "$phpDir\php.ini") -replace ';extension=openssl', 'extension=openssl' |
                              Set-Content "$phpDir\php.ini"
                              
                              Write-Host "OpenSSL setup completed for PHP 7.1"
                          }
                          catch {
                              Write-Host "OpenSSL installation failed, using workaround..."
                              # Add SSL configuration without enabling extension (fallback)
                              Add-Content "$phpDir\php.ini" "`n"
                              Add-Content "$phpDir\php.ini" "; SSL Configuration (fallback for PHP 7.1)"
                              Add-Content "$phpDir\php.ini" "openssl.cafile=`"$phpDir\cacert.pem`""
                              
                              # Download CA certificate bundle
                              try {
                                  Invoke-WebRequest -Uri "https://curl.se/ca/cacert.pem" -OutFile "$phpDir\cacert.pem" -TimeoutSec 30
                              } catch {
                                  Write-Host "CA bundle download failed, creating minimal config"
                              }
                          }
                      } else {
                          Write-Host "OpenSSL extension not found for PHP 7.1, skipping SSL setup"
                      }
                  } else {
                      # Enable OpenSSL for newer PHP versions (should work fine)
                      (Get-Content "$phpDir\php.ini") -replace ';extension=openssl', 'extension=openssl' |
                      Set-Content "$phpDir\php.ini"
                  }
                  
                  # Add PHP to PATH (at the beginning to override system PHP)
                  echo "$phpDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
                  $env:PATH = "$phpDir;$env:PATH"
                  
                  # Download and setup Composer (use 2.2 LTS for PHP 7.1, stable for others)
                  if ($phpVersion -eq "7.1") {
                      $composerUrl = "https://getcomposer.org/download/2.2.24/composer.phar"
                  } else {
                      $composerUrl = "https://getcomposer.org/composer-stable.phar"
                  }
                  Invoke-WebRequest -Uri $composerUrl -OutFile "$phpDir\composer.phar"
                  echo "@echo off" | Out-File -FilePath "$phpDir\composer.bat" -Encoding ascii
                  echo "php `"%~dp0composer.phar`" %*" | Out-File -FilePath "$phpDir\composer.bat" -Encoding ascii -Append

            - name: Installed version
              run: php -v

            - name: Composer validate
              shell: bash
              run: |
                  if [[ "${{ matrix.php-version }}" == "7.1" && "${{ matrix.os }}" == "windows-latest" ]]; then
                    # Use explicit path to ensure we use the correct Composer version (2.2.24) for PHP 7.1
                    php C:/php-7.1/composer.phar validate || {
                      echo "Normal validation failed, trying with SSL disabled for PHP 7.1..."
                      php C:/php-7.1/composer.phar config --global disable-tls true
                      php C:/php-7.1/composer.phar config --global secure-http false
                      php C:/php-7.1/composer.phar validate
                    }
                  else
                    composer validate
                  fi

            - name: Composer install (conditional)
              shell: bash
              run: |
                  # Configure SSL workaround for PHP 7.1 on Windows if needed
                  if [[ "${{ matrix.php-version }}" == "7.1" && "${{ matrix.os }}" == "windows-latest" ]]; then
                    # Test if SSL works, if not configure fallback
                    php -r "echo extension_loaded('openssl') ? 'OpenSSL loaded' : 'OpenSSL not loaded'; echo PHP_EOL;"
                    if ! php -r "file_get_contents('https://repo.packagist.org');" 2>/dev/null; then
                      echo "SSL not working, configuring Composer for PHP 7.1..."
                      php C:/php-7.1/composer.phar config --global disable-tls true
                      php C:/php-7.1/composer.phar config --global secure-http false
                      php C:/php-7.1/composer.phar config --global repos.packagist composer http://repo.packagist.org
                    fi
                  fi
                  
                  # Install dependencies based on PHP version
                  if [[ "${{ matrix.php-version }}" == "7.1" ]]; then
                    # Use explicit path for PHP 7.1 on Windows to ensure Composer 2.2.24 LTS
                    if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
                      php C:/php-7.1/composer.phar install;
                    else
                      composer install;
                    fi
                  else
                    composer require guzzlehttp/guzzle:"^7.4" guzzlehttp/promises:"^2.0" phpunit/phpunit:"^9.5" --dev --with-all-dependencies;
                  fi

            - name: Run PHPStan
              run: vendor/bin/phpstan analyse --no-progress

            - name: Run PHPUnit
              env:
                  CHECKOUT_PROCESSING_CHANNEL_ID: ${{ secrets.IT_CHECKOUT_PROCESSING_CHANNEL_ID }}
                  CHECKOUT_PREVIOUS_SECRET_KEY: ${{ secrets.IT_CHECKOUT_PREVIOUS_SECRET_KEY }}
                  CHECKOUT_PREVIOUS_PUBLIC_KEY: ${{ secrets.IT_CHECKOUT_PREVIOUS_PUBLIC_KEY }}
                  CHECKOUT_DEFAULT_SECRET_KEY: ${{ secrets.IT_CHECKOUT_DEFAULT_SECRET_KEY }}
                  CHECKOUT_DEFAULT_PUBLIC_KEY: ${{ secrets.IT_CHECKOUT_DEFAULT_PUBLIC_KEY }}
                  CHECKOUT_DEFAULT_OAUTH_CLIENT_ID: ${{ secrets.IT_CHECKOUT_DEFAULT_OAUTH_CLIENT_ID }}
                  CHECKOUT_DEFAULT_OAUTH_CLIENT_SECRET: ${{ secrets.IT_CHECKOUT_DEFAULT_OAUTH_CLIENT_SECRET }}
                  CHECKOUT_DEFAULT_OAUTH_PAYOUT_SCHEDULE_CLIENT_ID: ${{ secrets.IT_CHECKOUT_DEFAULT_OAUTH_PAYOUT_SCHEDULE_CLIENT_ID }}
                  CHECKOUT_DEFAULT_OAUTH_PAYOUT_SCHEDULE_CLIENT_SECRET: ${{ secrets.IT_CHECKOUT_DEFAULT_OAUTH_PAYOUT_SCHEDULE_CLIENT_SECRET }}
                  CHECKOUT_DEFAULT_OAUTH_ACCOUNTS_CLIENT_ID: ${{ secrets.IT_CHECKOUT_DEFAULT_OAUTH_ACCOUNTS_CLIENT_ID }}
                  CHECKOUT_DEFAULT_OAUTH_ACCOUNTS_CLIENT_SECRET: ${{ secrets.IT_CHECKOUT_DEFAULT_OAUTH_ACCOUNTS_CLIENT_SECRET }}
                  CHECKOUT_DEFAULT_OAUTH_ISSUING_CLIENT_ID: ${{ secrets.IT_CHECKOUT_DEFAULT_OAUTH_ISSUING_CLIENT_ID }}
                  CHECKOUT_DEFAULT_OAUTH_ISSUING_CLIENT_SECRET: ${{ secrets.IT_CHECKOUT_DEFAULT_OAUTH_ISSUING_CLIENT_SECRET }}
                  CHECKOUT_MERCHANT_SUBDOMAIN: ${{ secrets.IT_CHECKOUT_MERCHANT_SUBDOMAIN }}
              run: vendor/bin/phpunit --verbose
